{% extends "base.html" %}
{% block title %}Register Patient — MAAUN Clinic{% endblock %}

{% block content %}
<div class="page-header">
    <h1>➕ Register New Patient</h1>
    <a href="/" class="btn btn-primary">← Back to Dashboard</a>
</div>

<div class="card" style="max-width:560px;">
    <h2>🧾 Patient Information</h2>
    <form action="/register" method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Fatima Aliyu" required />
        </div>
        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" min="1" max="120" placeholder="e.g. 34" required />
        </div>
        <div class="form-group">
            <label for="complaint">Chief Complaint</label>
            <textarea id="complaint" name="complaint" placeholder="Describe the main symptom or reason for visit..." required></textarea>
        </div>
        <button type="submit" class="btn btn-success" style="width:100%;padding:.85rem;">
            ✅ Register & Add to Queue
        </button>
    </form>
</div>
{% endblock %}
