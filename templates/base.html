<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}MAAUN Clinic Queue{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            color: #2d3748;
            min-height: 100vh;
        }

        /* ── Nav ── */
        nav {
            background: linear-gradient(135deg, #1a5276, #2980b9);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }
        nav .logo {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        nav .logo span { font-size: 1.5rem; }
        nav ul { list-style: none; display: flex; gap: 1.5rem; }
        nav ul a {
            color: #d6eaf8;
            text-decoration: none;
            font-weight: 500;
            font-size: .95rem;
            padding: .3rem .6rem;
            border-radius: 4px;
            transition: background .2s;
        }
        nav ul a:hover { background: rgba(255,255,255,.15); color: #fff; }

        /* ── Page wrapper ── */
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

        /* ── Flash messages ── */
        .flash { padding: .85rem 1.2rem; border-radius: 8px; margin-bottom: 1rem; font-weight: 500; }
        .flash.success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .flash.error   { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .flash.info    { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
        .flash.warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }

        /* ── Cards ── */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h2 {
            font-size: 1.1rem;
            color: #1a5276;
            margin-bottom: 1rem;
            padding-bottom: .5rem;
            border-bottom: 2px solid #d6eaf8;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        /* ── Stat grid ── */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat {
            background: #fff;
            border-radius: 12px;
            padding: 1.2rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,.07);
        }
        .stat .num { font-size: 2.5rem; font-weight: 800; }
        .stat .label { font-size: .85rem; color: #718096; margin-top: .2rem; }
        .stat.waiting .num  { color: #e67e22; }
        .stat.seen .num     { color: #27ae60; }
        .stat.total .num    { color: #2980b9; }

        /* ── Queue table ── */
        table { width: 100%; border-collapse: collapse; font-size: .9rem; }
        th { background: #eaf4fb; color: #1a5276; text-align: left; padding: .7rem 1rem; }
        td { padding: .7rem 1rem; border-bottom: 1px solid #ebf0f5; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fbff; }
        .ticket {
            display: inline-block;
            background: #2980b9;
            color: #fff;
            border-radius: 20px;
            padding: .1rem .65rem;
            font-size: .8rem;
            font-weight: 700;
        }
        .empty { text-align: center; color: #a0aec0; padding: 2rem; font-style: italic; }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            padding: .6rem 1.4rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: .95rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity .2s, transform .1s;
        }
        .btn:active { transform: scale(.97); }
        .btn-primary  { background: #2980b9; color: #fff; }
        .btn-success  { background: #27ae60; color: #fff; }
        .btn-warning  { background: #e67e22; color: #fff; }
        .btn:hover    { opacity: .88; }

        /* ── Form ── */
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; margin-bottom: .35rem; color: #4a5568; }
        input, textarea, select {
            width: 100%;
            padding: .7rem 1rem;
            border: 1.5px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color .2s;
            background: #f9fbfd;
        }
        input:focus, textarea:focus { outline: none; border-color: #2980b9; background: #fff; }
        textarea { resize: vertical; min-height: 80px; }

        /* ── Page header ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .page-header h1 { font-size: 1.6rem; color: #1a5276; }
    </style>
</head>
<body>
<nav>
    <a class="logo" href="/"><span>🏥</span> MAAUN Clinic Queue</a>
    <ul>
        <li><a href="/">Dashboard</a></li>
        <li><a href="/register">Register Patient</a></li>
        <li><a href="/history">History</a></li>
    </ul>
</nav>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
            <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>
</body>
</html>
